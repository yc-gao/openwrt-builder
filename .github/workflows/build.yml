name: 'openwrt builder'

on: [push]

env:
  REPO: https://github.com/openwrt/openwrt.git
  TAG: v23.05.4

jobs:
  build:
    strategy:
      matrix:
        TARGET: ['x86-64']
        TAG: ["v23.05.4"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: installing deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang g++ gcc-multilib g++-multilib \
            libboost-all-dev libncurses5-dev libssl-dev \
            python3-distutils \
            gettext git flex bison gawk rsync unzip zlib1g-dev \
            file wget qemu-system
      - name: prepare
        run: |
          git clone -b ${{ matrix.TAG }} ${REPO} openwrt
          cd openwrt
          # cp ${{ github.workspace }}/config/${{ matrix.TARGET }}.feeds.conf.default ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp ${{ github.workspace }}/config/${{ matrix.TARGET }}.config ./.config
          make defconfig
      - name: compile
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 300
          max_attempts: 3
          command: |
            docker run --rm -ti \
              -v $PWD:$PWD -w $PWD/openwrt \
              openwrt/imagebuilder:${{ matrix.TARGET }}-${{ matrix.TAG }} \
              make defconfig
            docker run --rm -ti \
              -v $PWD:$PWD -w $PWD/openwrt \
              openwrt/imagebuilder:${{ matrix.TARGET }}-${{ matrix.TAG }} \
              make -j$(nproc) download clean world
          new_command_on_retry: |
            docker run --rm -ti \
              -v $PWD:$PWD -w $PWD/openwrt \
              openwrt/imagebuilder:${{ matrix.TARGET }}-${{ matrix.TAG }} \
              make -j1 V=sc download clean world
      - uses: actions/upload-artifact@v3
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets

      - uses: actions/upload-artifact@v3
        with:
          name: openwrt-package
          path: openwrt/bin/packages
